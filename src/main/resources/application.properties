# ===== Application =====
spring.application.name=todoLists

# ===== DataSource (override via application-docker.properties) =====
# Default: use Docker MySQL on port 3307 (for local development with IDEA)
spring.datasource.url=jdbc:mysql://localhost:3307/todolist_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=sleekflow
spring.datasource.password=sleekflow
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ===== JWT =====
app.jwt.secret=sleekflow-super-secret-key-change-in-production-at-least-256-bits!!
app.jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.com.sleekflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ===== Actuator (minimal) =====
management.endpoints.web.exposure.include=health

# ===== OpenAPI / Swagger =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
