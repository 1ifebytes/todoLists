# ===== Local Development Profile =====
# For: IDEA local app connecting to Docker MySQL

# Docker MySQL is mapped to localhost:3307 (see docker-compose.yml)
spring.datasource.url=jdbc:mysql://localhost:3307/todolist_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC

# Use the sleekflow user created in docker-compose (not root)
spring.datasource.username=sleekflow
spring.datasource.password=sleekflow

# JWT (same as docker)
app.jwt.secret=sleekflow-super-secret-key-change-in-production-at-least-256-bits!!

# Logging for debugging
logging.level.com.sleekflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
